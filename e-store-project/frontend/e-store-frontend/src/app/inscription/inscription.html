<div class="login-container">
  <div class="login-card">
    <h2>Créer un compte</h2>
    <p class="subtitle">Rejoignez NexShop aujourd'hui</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-row">
        <div class="form-group half-width">
          <label for="prenom">Prénom</label>
          <input
            type="text"
            id="prenom"
            formControlName="prenom"
            placeholder="Votre prénom"
            [ngClass]="{'is-invalid': registerForm.get('prenom')?.invalid && registerForm.get('prenom')?.touched}"
          >
        </div>
        <div class="form-group half-width">
          <label for="nom">Nom</label>
          <input
            type="text"
            id="nom"
            formControlName="nom"
            placeholder="Votre nom"
            [ngClass]="{'is-invalid': registerForm.get('nom')?.invalid && registerForm.get('nom')?.touched}"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="prenom.nom@email.com"
          [ngClass]="{'is-invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="Min. 6 caractères"
            [ngClass]="{'is-invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}"
          >
          <button type="button" class="btn-toggle-password" (click)="togglePasswordVisibility()">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 2rem;">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          placeholder="Répétez le mot de passe"
          [ngClass]="{'is-invalid': registerForm.get('confirmPassword')?.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched}"
        >
        <div class="error-text" *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch') && registerForm.get('confirmPassword')?.touched">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn-login">
        S'inscrire
      </button>
    </form>

    <div class="register-link">
      Déjà un compte ? <a href="/connexion">Se connecter</a>
    </div>
  </div>
</div>
