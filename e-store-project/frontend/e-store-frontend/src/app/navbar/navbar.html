<nav>
  <a routerLink="/">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 125" width="150px" height="100%">
      <g id="icon-group" transform="translate(10, 10)">
        <rect x="8" y="8" width="100" height="100" rx="24" fill="#1a1a1a" />
        <rect x="0" y="0" width="100" height="100" rx="24" fill="#c8502a" />
        <line x1="-8" y1="50" x2="10" y2="50" stroke="#e8bc96" stroke-width="3.5" stroke-linecap="round" />
        <line x1="90" y1="50" x2="108" y2="50" stroke="#e8bc96" stroke-width="3.5" stroke-linecap="round" />
        <line x1="6" y1="6" x2="18" y2="18" stroke="#e8bc96" stroke-width="3.5" stroke-linecap="round" />
        <line x1="94" y1="6" x2="82" y2="18" stroke="#e8bc96" stroke-width="3.5" stroke-linecap="round" />
        <polygon points="50,18 56,18 53,24" fill="#e8bc96" />
        <polygon points="35,18 41,18 38,24" fill="#e8bc96" />
        <polygon points="65,18 71,18 68,24" fill="#e8bc96" />
        <path d="M 38 35 L 62 35 L 72 60 L 28 60 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" />
        <line x1="33" y1="47.5" x2="67" y2="47.5" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
        <circle cx="38" cy="70" r="4" fill="#ffffff" />
        <circle cx="62" cy="70" r="4" fill="#ffffff" />
      </g>

      <text
        x="135"
        y="75"
        font-family="'Arial Black', 'Segoe UI Black', Impact, sans-serif"
        font-size="70"
        font-weight="900"
        letter-spacing="-2"
        text-anchor="start"
      >
        <tspan fill="#1a1a1a">Nex</tspan>
        <tspan fill="#c8502a">Shop</tspan>
      </text>

      <text
        x="140"
        y="102"
        font-family="'Montserrat', 'Segoe UI', Arial, sans-serif"
        font-size="14"
        font-weight="600"
        fill="#1a1a1a"
        letter-spacing="6.5"
        text-anchor="start"
      >
        NEXT LEVEL SHOPPING
      </text>

      <g id="divider" transform="translate(0, 115)">
        <circle cx="305" cy="0" r="2.5" fill="#e8bc96" />
        <line x1="140" y1="0" x2="295" y2="0" stroke="#e8bc96" stroke-width="1.5" stroke-linecap="round" />
        <line x1="315" y1="0" x2="470" y2="0" stroke="#e8bc96" stroke-width="1.5" stroke-linecap="round" />
      </g>
    </svg>
  </a>

  <ul class="layout" *ngIf="customerService.isLoggedIn()">
    <li>
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Accueil</a>
    </li>
    <li>
      <a routerLink="/catalog" routerLinkActive="active-link">Catalog</a>
    </li>
    <li>
      <a routerLink="/commands" routerLinkActive="active-link">Commands</a>
    </li>
    <li>
      <a routerLink="/bills" routerLinkActive="active-link">Bills</a>
    </li>
  </ul>

  <div class="longin" *ngIf="!customerService.isLoggedIn(); else profileLink">
    <a routerLink="/connexion" routerLinkActive="active-link">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
        />
      </svg>
      <span> Connexion </span>
    </a>
  </div>

  <ng-template #profileLink>
    <div class="longin profile-actions">
      <a routerLink="/profile" routerLinkActive="active-link" class="icon-circle" aria-label="Profile">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
          />
        </svg>
      </a>
      <button type="button" class="logout-btn icon-circle" (click)="logout()" aria-label="Logout">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M18 12H9m0 0 3-3m-3 3 3 3"
          />
        </svg>
      </button>
    </div>
  </ng-template>
</nav>
