<div class="profile-page" *ngIf="customer as user">
  <div class="profile-card">
    <p class="eyebrow">Mon profile</p>
    <h1>{{ user.firstName }} {{ user.lastName }}</h1>
    <p class="subtitle">Votre compte est deja connecte.</p>

    <div class="profile-grid" *ngIf="!isEditing">
      <div class="profile-item">
        <span class="label">Email</span>
        <strong>{{ user.email }}</strong>
      </div>
      <div class="profile-item">
        <span class="label">Telephone</span>
        <strong>{{ user.phoneNumber || 'Not provided' }}</strong>
      </div>
      <div class="profile-item">
        <span class="label">Address</span>
        <strong>{{ user.address || 'Not provided' }}</strong>
      </div>
    </div>

    <form class="edit-form" *ngIf="isEditing" [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <div class="form-row">
        <label>First name</label>
        <input type="text" formControlName="firstName" />
      </div>

      <div class="form-row">
        <label>Last name</label>
        <input type="text" formControlName="lastName" />
      </div>

      <div class="form-row">
        <label>Phone</label>
        <input type="text" formControlName="phoneNumber" />
      </div>

      <div class="form-row">
        <label>Address</label>
        <input type="text" formControlName="address" />
      </div>

      <div class="form-error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <div class="edit-actions">
        <button type="button" class="secondary-action" (click)="cancelEdit()" [disabled]="isSubmitting">
          Cancel
        </button>
        <button type="submit" class="primary-action" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Save changes' }}
        </button>
      </div>
    </form>

    <div class="actions">
      <a routerLink="/accueil" class="secondary-action">Retour accueil</a>
      <button type="button" class="secondary-action" (click)="startEdit()" *ngIf="!isEditing">Edit profile</button>
      <button type="button" class="primary-action" (click)="logout()" *ngIf="!isEditing">Se deconnecter</button>
    </div>
  </div>
</div>
